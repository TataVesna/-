    t: "Давай начнём с главного, потому что этого почти никто не объясняет.\n\nВнутри тела ничего не висит само по себе. Мочевой пузырь, матка, кишечник — все органы удерживает на месте одна большая структура: фасция. Это плотная плёнка из соединительной ткани, которая обволакивает каждый орган, каждую мышцу, и связывает всё тело в единую сеть. Без неё органы просто опустились бы вниз под действием силы тяжести.\n\nВнизу живота фасция образует что-то вроде гамака — он натянут между лобковой костью спереди и копчиком сзади. Этот гамак и есть тазовое дно. Именно он держит органы малого таза снизу и не даёт им опускаться.\n\nКогда говорят «слабое тазовое дно» — обычно думают про мышцы. Но мышцы — это только часть. Гамак сделан в основном из фасции, и держит он за счёт упругости этой фасции, а не только за счёт мышечной силы.\n\nСамое важное: фасция — живая ткань. Внутри неё работают клетки-строители (их называют фибробласты). Они постоянно обновляют и ремонтируют фасцию — но только когда получают правильный сигнал. Нет сигнала — фасция слабеет, гамак провисает, органы опускаются.\n\nЭтот курс — про то, как дать фасции этот сигнал.",

  2: {
    t: "Три проблемы, с которыми женщины приходят чаще всего, на самом деле — одна.\n\nТРИ ПРОБЛЕМЫ\n1. Подтекание мочи при чихе, смехе, кашле. Когда фасция вокруг мочевого пузыря ослабла, при резком давлении (а чих — это резкий скачок давления) она не успевает удержать, и капля мочи выходит.\n2. Опущение органов. Гамак провис, и органы опустились ниже, чем должны быть. Появляется ощущение тяжести или «выпадения» внизу живота.\n3. Частые походы в туалет.\n\nКазалось бы — разные проблемы. Но причина у них одна: фасция перестала держать.\n\nА почему она перестала? Три причины складываются вместе.\n\nТРИ ПРИЧИНЫ\n1. Снижение эстрогена. После 40 лет уровень женского гормона эстрогена падает. А именно эстроген раньше давал клеткам команду строить упругую фасцию. Гормона меньше — фасция слабеет.\n2. Мало движения. Фасция обновляется только когда получает нагрузку — натяжение, растяжение. Сидячая жизнь = нет нагрузки = клетки-строители «засыпают».\n3. Прогиб в пояснице. Когда таз наклонён вперёд и поясница прогнута, внутреннее давление в животе постоянно давит вниз — прямо на тазовое дно. Целый день, годами.\n\nТри причины вместе — и фасция сдаётся.",
    p: "Давай проверим две вещи прямо сейчас.\n\nПРОВЕРКА 1 — осанка (лёжа). Ляг на спину на твёрдую поверхность (пол, не кровать), ноги выпрями. Просунь ладонь под поясницу, в прогиб.\n• Ладонь проходит впритык, плотно — осанка в норме.\n• Большой свободный зазор, рука гуляет — поясница слишком прогнута, таз наклонён вперёд. Это давит на тазовое дно.\n• Поясница вжата в пол, ладонь не лезет — наоборот, прогиб сглажен.\n\n(Делаем лёжа, а не у стены: лёжа объём ягодиц не отодвигает таз и не искажает результат.)\n\nПРОВЕРКА 2 — дыхание. Положи одну ладонь на грудь, другую на живот. Сделай обычный вдох, не задумываясь.\n• Если первой поднялась рука на ГРУДИ — ты дышишь грудью. Это неправильно для тазового дна (объясню в модуле про дыхание).\n• Если первой поднялась рука на ЖИВОТЕ — уже лучше, живот включается. Но самое полное дыхание — это когда расширяется и живот, и нижние рёбра в стороны. Этому научимся в модуле про дыхание.\n\nЗапомни свои результаты — к ним вернёмся.",
    k: "Подтекание, опущение и частые походы в туалет — не три отдельные проблемы. Это одна. И решение у неё одно."
  },
  3: {
    t: "Кегель — это самое популярное упражнение для тазового дна. Тебе наверняка его советовали: сжать мышцы тазового дна, как будто останавливаешь струю мочи, и отпустить. И так много раз.\n\nДля мышц это полезно. Но вот в чём проблема: при подтекании и опущении дело чаще не в слабых мышцах, а в ослабшей фасции — в том самом гамаке. А Кегель на фасцию почти не действует. Сейчас объясню почему.\n\nПредставь фасцию как ткань с живыми клетками внутри. Эти клетки умеют чувствовать, что с тканью происходит — но реагируют они только на один тип воздействия: на РАСТЯЖЕНИЕ. Когда ткань тянут, клетки понимают «нас нагружают, надо стать крепче» — и начинают укреплять фасцию.\n\nА Кегель — это не растяжение. Это сжатие. Мышца сжимается в комок и расслабляется. Фасцию при этом никто не тянет. Клетки не получают сигнала. И сколько ни делай Кегель — фасция остаётся такой же слабой.\n\nЭто как разница между двумя ситуациями. Если резинку растягивать каждый день — она будет тренироваться оставаться упругой. А если резинку просто сжимать в кулаке — с ней ничего не произойдёт, она так и останется растянутой и вялой.\n\nПоэтому Кегель не убирает подтекание у многих женщин. Они делают его месяцами — а толку нет. Не потому что плохо стараются. Потому что воздействуют не на ту структуру.\n\nЧтобы укрепить фасцию, нужно её РАСТЯГИВАТЬ правильным образом. Как — узнаешь в следующих модулях.",
    p: "Давай разложим по полочкам, чтобы не было путаницы.\n\nЧто Кегель ДАЁТ:\n• укрепляет мышцы тазового дна — они становятся сильнее как мышцы\n• помогает в моменте удержать давление (на этом построен приём the Knack — о нём в модуле 3)\n• полезен после родов, когда мышцы реально растянуты и ослаблены\n\nЧего Кегель НЕ ДАЁТ:\n• не укрепляет фасцию — ту самую соединительную сетку, что держит органы\n• не убирает причину опущения и подтекания, если дело в фасции, а не в мышцах\n• при постоянном сжатии может даже навредить — перенапряжённое тазовое дно тоже подтекает, потому что мышца, которая не умеет расслабляться, не умеет и вовремя срабатывать\n\nВывод: Кегель — не враг, но и не решение. Это один инструмент для мышц. А нам нужен другой — для фасции. В следующих модулях будет совсем другое ощущение: не сжатие, а раскрытие, удлинение, лифт изнутри. Вот это и есть работа с фасцией.",
    k: "Кегель тренирует мышцу. Но при подтекании проблема в фасции — а её надо не сжимать, а растягивать."
  },
  4: {
    t: "Теперь — про главный инструмент, которым мы будем растягивать фасцию тазового дна. И это не упражнение в привычном смысле. Это дыхание.\n\nПредставь себе цилиндр, внутри которого два поршня — сверху и снизу. Сверху — диафрагма (это большая куполообразная мышца под лёгкими, главная мышца дыхания). Снизу — тазовое дно, наш гамак. Между ними — живот с органами.\n\nЭти два поршня связаны и двигаются вместе:\n\nКогда ты вдыхаешь — диафрагма сверху опускается вниз. Она мягко давит на органы, и те передают давление на тазовое дно. Гамак внизу слегка прогибается вниз и растягивается. Вот оно — то самое растяжение, которое чувствуют клетки фасции!\n\nКогда ты выдыхаешь — диафрагма поднимается обратно вверх, давление уходит, и тазовое дно мягко поднимается следом.\n\nПолучается, что каждый правильный вдох слегка растягивает фасцию тазового дна. А ты дышишь около 20 000 раз в день. Это 20 000 крошечных тренировок фасции — бесплатно, без единого упражнения. Если, конечно, дышишь правильно.",
    p: "Сейчас просто понаблюдай за собой — ничего не меняй.\n\nСядь или ляг удобно. Положи одну руку на грудь, другую на живот. Подыши как обычно, 10 вдохов.\n\nЗаметь: какая рука двигается больше? Та, что на груди, или та, что на животе? Просто запомни — в следующем уроке поймёшь, что это значит.",
    k: "Ты дышишь 20 000 раз в день. Каждый правильный вдох — это микро-тренировка тазового дна."
  },
  5: {
    t: "Возможно, ты подумала: «но я ведь и так дышу, диафрагма ведь работает всегда». Да, работает. Но разница в том, НАСКОЛЬКО глубоко и куда идёт вдох. Есть три разных способа дышать — и только один правильный.\n\nГРУДЬЮ\nНа вдохе поднимаются плечи и грудь, а живот почти не двигается. Диафрагма опускается всего на 10–15 мм (полтора сантиметра). Воздух заходит за счёт мышц груди и шеи. Тазовое дно почти не получает растяжения. Так дышит большинство людей, особенно в стрессе.\n\nТОЛЬКО ЖИВОТОМ\nНа вдохе живот сильно выпячивается вперёд — но грудная клетка и рёбра при этом не двигаются. Диафрагма опускается глубже — на 25–35 мм. Но рёбра остаются зажатыми, и весь вдох уходит только вниз, в переднюю стенку живота. Это уже лучше, чем грудью, но ещё не полное дыхание — работает только одно направление.\n\nПОЛНОЕ ДИАФРАГМАЛЬНОЕ\nВот это — то, что нам нужно. На вдохе диафрагма опускается на 35–70 мм (в 3–4 раза глубже, чем при грудном!), живот мягко выходит вперёд, И нижние рёбра расходятся в стороны и в спину. Вдох идёт во все стороны — вперёд, в бока, назад. Грудная клетка работает целиком, диафрагма опускается глубоко и равномерно. Тазовое дно получает полноценное мягкое растяжение.\n\nКак это работает: когда диафрагма опускается — она мягко давит на органы, и те мягко давят вниз на тазовое дно. Это НЕ опасное давление — это нежный толчок, как на батуте. А когда диафрагма поднимается обратно — тазовое дно пружинит вверх. Именно эти «качели» вниз-вверх с каждым вдохом-выдохом и есть тренировка фасции. Чем глубже ход диафрагмы — тем больше амплитуда качелей — тем сильнее сигнал клеткам-строителям внутри фасции: «нужно стать крепче». При грудном дыхании (10–15 мм) качели почти нулевые — фасция не получает сигнала. При полном диафрагмальном (35–70 мм) — это 20 000 полноценных микро-тренировок в день, бесплатно и автоматически.\n\nПочему важна именно эта разница? Клетки фасции реагируют только на достаточное растяжение. При грудном дыхании его почти нет. При дыхании только животом оно есть, но одностороннее. А при полном диафрагмальном — равномерное и глубокое, как и должно быть.\n\nПредставь верёвку между диафрагмой и тазовым дном. Грудное дыхание тянет её на 10–15 мм — другой конец почти не шевельнётся. Дыхание только животом — на 25–35 мм, но рывком в одну сторону. Полное диафрагмальное — на 35–70 мм, плавно и во все стороны. Разница огромная: между 10 и 70 мм — в семь раз.\n\nЧто даёт полное диафрагмальное дыхание, кроме тренировки тазового дна:\n• успокаивает нервную систему, снижает тревогу\n• улучшает работу кишечника (диафрагма массирует органы)\n• помогает лимфе двигаться, уменьшает отёки\n• насыщает кровь кислородом лучше\n\nЧто бывает, когда годами дышишь только грудью:\n• тазовое дно недополучает нагрузку и слабеет\n• тело живёт в лёгком постоянном напряжении\n• диафрагма «застывает», становится менее подвижной\n\nЧто бывает, когда годами дышишь только животом (выпячивая его, без рёбер):\n• передняя стенка живота растягивается и слабеет — живот выглядит более выпуклым\n• нижние рёбра и грудная клетка теряют подвижность, «закостеневают»\n• давление на вдохе всё время бьёт в одну точку — вниз и вперёд, что со временем тоже перегружает тазовое дно\n• дыхание остаётся неполным — лёгкие наверху и бока почти не вентилируются\n\nЧто бывает, когда женщина постоянно держит живот втянутым (ради красоты, годами):\n• диафрагма не может опуститься — она упирается в зажатую брюшную стенку, и дыхание становится поверхностным, грудным\n• тазовое дно перестаёт получать ритмичное растяжение от дыхания — слабеет\n• постоянное напряжение живота повышает давление внутри — и оно давит вниз, на тазовое дно\n• нарушается работа кишечника, появляется вздутие, тяжесть\n• тело живёт в режиме лёгкого хронического стресса — втянутый живот тело считывает как «опасность»\n\nПоэтому первое, что нужно сделать — разрешить животу быть мягким и свободным. Да, он будет немного выходить вперёд на вдохе. Это правильно и полезно. Плоский втянутый живот красив на фото, но вреден для тазового дна.",
    p: null,
    k: "Грудное дыхание — слишком слабо. Дыхание только животом — однобоко. Нужно полное: живот плюс рёбра во все стороны."
  },
  6: {
    t: "Теперь научимся дышать животом правильно. Это навык — его осваивают постепенно, шаг за шагом. Не торопись: сначала получится лёжа, потом сидя, потом стоя. Каждый этап можно осваивать несколько дней.\n\nГлавное правило: на вдохе вверх НИЧЕГО не поднимается — ни плечи, ни грудь. Расширяется только живот и нижние рёбра.",
    p: "ШАГ 1 — учимся лёжа (это проще всего, тело расслаблено):\n\n1. Ляг на спину, согни колени, стопы на полу.\n2. Положи ладонь (или небольшую книгу) на живот, вторую руку — на грудь.\n3. Сначала спокойно выдохни весь воздух — живот опустится.\n4. Теперь медленно вдыхай через нос, считая до четырёх. Направляй воздух «в живот» — представь, что надуваешь воздушный шарик в животе. Рука на животе должна подниматься. Рука на груди — оставаться на месте.\n5. Медленно выдыхай через рот, считая до шести. Живот опускается.\n6. Повтори 10–15 раз.\n\nЕсли не получается:\n• Плечи ползут вверх → перед началом опусти плечи, «уложи» их в пол.\n• Поднимается грудь, а не живот → представь, что грудь — тяжёлая неподвижная крышка, и воздух идёт ПОД неё, вниз в живот.\n• Живот не надувается → скорее всего, ты его держишь. Отпусти, расслабь. Пусть на вдохе он свободно выпячивается — это правильно.\n• Закружилась голова → дышишь слишком сильно. Дыши спокойнее, тише.\n\nШАГ 2 — добавляем рёбра (через пару дней, когда живот освоен):\n\nПоложи ладони на нижние рёбра по бокам. На вдохе почувствуй, как живот надувается И рёбра расходятся в стороны, раздвигая твои ладони. Как будто на поясе раскрывается обруч. На выдохе рёбра сходятся обратно. Так дыхание становится объёмным — наполняется и живот, и бока.\n\nШАГ 3 — сидя и стоя (ещё через несколько дней):\n\nПовтори то же дыхание сидя на стуле (спина прямая, не опирайся), потом стоя. Цель — чтобы через пару недель ты дышала так постоянно, не задумываясь.\n\nКак понять, что дышишь правильно:\n✓ на вдохе живот мягко выходит вперёд\n✓ нижние рёбра расходятся в стороны\n✓ плечи и грудь не поднимаются\n✓ выдох длиннее вдоха",
    k: "Это не упражнение на 5 минут. Это новая привычка дышать — на всю жизнь."
  },
  7: {
    t: "Когда ты освоишь дыхание животом, произойдёт кое-что важное: тазовое дно начнёт работать само, без твоего участия.\n\nПомнишь про два поршня? На выдохе диафрагма поднимается вверх — и тазовое дно рефлекторно поднимается следом. Само. Тебе не надо его сжимать или о нём думать. Оно подхватывается автоматически, потому что связано с диафрагмой через фасцию.\n\nЭто и есть здоровая работа тазового дна — когда оно само поднимается и опускается в ритме дыхания. Не надо постоянно его контролировать. Надо просто восстановить связь с дыханием.\n\nВажно: на выдохе НЕ сжимай тазовое дно сознательно. Если начнёшь специально его поджимать — получится Кегель, а мы уже знаем, что это не то. Просто дай ему двигаться самому.",
    p: "Ляг на спину, дыши животом, как в прошлом уроке. Теперь перенеси внимание вниз — на область между лобком и копчиком (там, где тазовое дно).\n\n• На ВДОХЕ — есть ли лёгкое чувство, что внизу что-то мягко опускается, расширяется? Это тазовое дно растягивается.\n• На ВЫДОХЕ — есть ли чувство, что внизу что-то мягко подтягивается вверх? Это оно поднимается само.\n\nНичего не сжимай специально. Просто наблюдай. Сделай 10 спокойных вдохов-выдохов.\n\nЕсли чувствуешь это движение — отлично, связь работает. Если пока не чувствуешь — это нормально, она восстановится за 1–3 недели практики. Не переживай.",
    k: "Здоровое тазовое дно не нужно держать под контролем. Оно работает само — вместе с дыханием."
  },
  8: {
    t: "А что делать прямо сейчас, если подтекает при чихе? Пока фасция восстанавливается (на это нужны месяцы), есть приём, который помогает с первого дня. В физиотерапии его называют the Knack (читается «зэ нэк», означает «приём», «сноровка»).\n\nВся фишка приёма в одном слове: ДО. Подтянуть тазовое дно нужно ДО чиха, а не во время и не после. Если ждать самого чиха — уже поздно: давление выстреливает мгновенно, и капля выходит раньше, чем ты успеешь среагировать. А вот если подтянуть за секунду ДО — тазовое дно уже «закрыто» и держит, и подтекания не будет.\n\nЗапомни так: не «чихнула — подтянула», а «подтянула — потом чихнула». Порядок решает всё.\n\nГлавная хитрость — поймать момент ДО. Чих не приходит внезапно: сначала всегда есть предупреждение. Щекочет в носу, набираешь воздух — и только потом сам чих. Вот в эту секунду предупреждения и надо успеть подтянуть тазовое дно. То же с кашлем (сначала першит в горле) и со смехом (чувствуешь, что сейчас засмеёшься). Лови этот момент — он и есть твоё окно.\n\nДа, здесь мы как раз сжимаем тазовое дно — как в Кегеле. Но тут это уместно: задача не укрепить фасцию, а просто механически «придержать» на пару секунд, чтобы не было протечки. Это скорая помощь, а не лечение.\n\nХорошая новость: исследования показали, что подтекание заметно уменьшается уже через неделю такой привычки. А через пару месяцев, когда фасция окрепнет от вакуума и дыхания, этот приём тебе вообще перестанет быть нужен — тело начнёт держать само.",
    p: "Сначала потренируемся на кашле — его легко вызвать нарочно.\n\n1. Лёжа: подтяни тазовое дно вверх (как будто приподнимаешь что-то внутри) → удерживая, нарочно кашляни → отпусти. Повтори 10 раз.\n2. Стоя: то же самое, 10 раз (стоя сложнее — давления больше).\n3. В течение дня: возьми за правило перед каждым кашлем, чихом, перед тем как поднять сумку или встать со стула — СНАЧАЛА подтянуть тазовое дно, ПОТОМ действие. Всегда в этом порядке.\n\nЗа 1–2 недели это войдёт в привычку, и тело само будет подтягиваться ДО нагрузки, даже без твоего участия.",
    k: "Секрет в одном слове — ДО. Подтянула ДО чиха, а не во время. Иначе поздно."
  },
  9: {
    t: "Теперь — самое мощное упражнение курса. Оно называется «вакуум» (или по-другому «уддияна бандха» — это древняя йоговская техника).\n\nСуть: ты делаешь глубокий выдох, а потом, не вдыхая, как будто «вдыхаешь» животом — но без воздуха. Живот при этом втягивается под рёбра, образуя как бы пустоту, вакуум. Диафрагма поднимается высоко вверх — выше, чем при обычном дыхании.\n\nПочему это работает лучше всего: когда диафрагма поднимается так высоко, она сильно тянет за собой всю фасцию вверх — и тазовое дно поднимается вместе с ней. Получается мощное растяжение фасции. А именно сильное растяжение и нужно клеткам, чтобы начать укреплять ткань.\n\nПри вакууме тазовое дно поднимается само, рефлекторно. Тебе не нужно его специально сжимать.\n\nВАЖНО: вакуум делают ТОЛЬКО на пустой желудок — утром до еды или через 3 часа после еды. На полный желудок будет тошнить.",
    p: "⚠️ ТОЛЬКО НА ПУСТОЙ ЖЕЛУДОК\n\n1. Встань, ноги на ширине плеч, слегка наклонись вперёд и обопрись руками о бёдра.\n2. Сделай глубокий полный выдох — выпусти весь воздух, до конца.\n3. Не вдыхая, «закрой горло» (как будто сдерживаешь зевок или глоток).\n4. Теперь сделай движение вдоха грудью — но воздух не впускай. Грудная клетка расширится, а живот сам втянется вверх и под рёбра. Появится впадина под рёбрами.\n5. Задержись в этом положении на 5–10 секунд.\n6. Расслабь живот, расслабь горло и спокойно вдохни.\n7. Сделай 3–4 обычных вдоха, отдохни.\n8. Повтори. Начни с 5 раз.\n\nНе старайся втянуть живот мышцами — он втянется сам, от того что ты «вдыхаешь» грудью без воздуха.",
    k: "Вакуум поднимает тазовое дно изнутри сильнее всего — и без единого сжатия.",
    w: "Не задерживай дыхание через силу. Захотелось вдохнуть — спокойно вдохни. Со временем удержание станет легче."
  },
  10: {
    t: "Чем дольше ты удерживаешь вакуум — тем лучше результат. И вот почему.\n\nКлеткам фасции важно не количество повторений, а длительность нагрузки. Представь: если коротко дёрнуть ткань туда-сюда — клетки не успеют отреагировать. А если подержать ткань в натяжении подольше — они «понимают», что нагрузка серьёзная, и запускают укрепление.\n\nПоэтому лучше 8–10 спокойных удержаний по 10–15 секунд, чем 30 быстрых рывков.\n\nКак часто делать: лучше всего 2–3 раза в день. Утром обязательно, плюс по возможности перед обедом и ужином (всё на пустой желудок). Чем чаще ты повторяешь — тем чаще клетки получают сигнал, и тем быстрее результат. Но даже одного раза утром достаточно, чтобы со временем увидеть изменения. Не получается три раза — делай один, это уже работает.",
    p: "• 8–10 удержаний по 10–15 секунд\n• между удержаниями — 3–4 спокойных вдоха, чтобы отдышаться\n• всего уходит около 5 минут\n\nУтром на пустой желудок — обязательно.\nПеред обедом и ужином (если желудок пустой) — по желанию, для ускорения.\n\nС каждым днём старайся удерживать чуть дольше. Замечай: чувство лифта внизу становится сильнее?",
    k: "Лучше дольше держать, чем чаще дёргать. Фасция отзывается на длительное натяжение."
  },
  11: {
    t: "Помнишь третью причину из урока 2 — прогиб в пояснице и передний наклон таза? Сейчас разберёмся, как она вредит и почему с ней нужно работать особым образом.\n\nКогда таз наклонён вперёд, а поясница слишком прогнута (это бывает от долгого сидения), мышца, которая идёт от поясницы к бедру (подвздошно-поясничная), укорачивается и тянет поясницу вперёд. Диафрагма наверху зажимается и не может нормально опускаться. А внутреннее давление в животе вместо того, чтобы распределяться, давит вниз — прямо на тазовое дно. И так целый день.\n\nА теперь главное — про фасцию. Фасция обладает важным свойством: она ЗАСТЫВАЕТ в том положении, в котором тело находится дольше всего. Если ты годами сидишь с наклонённым вперёд тазом, фасция вокруг поясницы, таза и бедра постепенно «запоминает» это положение и затвердевает именно в нём. Она как глина: подержи её долго в одной форме — и она схватится в этой форме.\n\nЭто работает и как компенсация. Если где-то тело перекошено (например, одно плечо ниже, или таз развёрнут), фасция застывает так, чтобы это компенсировать — и закрепляет перекос. Поэтому прогиб в пояснице — это не просто слабые мышцы. Это фасция, которая буквально «отвердела» в неправильной форме.\n\nЧто из этого следует для практики. Мышцу можно растянуть за 30 секунд — она эластична. А фасцию так быстро не возьмёшь: чтобы она начала менять форму, её нужно удерживать в растяжении ДОЛЬШЕ — от 1,5 до 3 минут. Короткая растяжка расслабит мышцу, но фасция вернётся обратно. Только долгое, медленное удержание заставляет фасцию постепенно «потечь» и принять новую форму.\n\nПоэтому в этом уроке растяжки делаются долго и медленно. Не торопись — здесь время работает на тебя.",
    p: "УПРАЖНЕНИЕ 1 — учим таз стоять ровно (наклоны таза лёжа):\n\n1. Ляг на спину, колени согнуты, стопы на полу.\n2. На выдохе мягко прижми поясницу к полу — представь, что подкручиваешь таз чуть вверх, как будто прячешь копчик вперёд. Поясница прижалась к полу.\n3. Задержись на 10 секунд, дыша спокойно.\n4. Расслабься. Повтори 10 раз.\nЭто тренирует мышцы держать таз ровно.\n\nУПРАЖНЕНИЕ 2 — растягиваем фасцию бедра (главное упражнение, делаем ДОЛГО):\n\n1. Встань на одно колено (как рыцарь): одна нога согнута впереди под прямым углом, вторая — коленом на полу сзади (подложи что-то мягкое под колено).\n2. Медленно подай таз вперёд, не прогибая поясницу. Почувствуешь растяжение спереди в области бедра и паха той ноги, что сзади.\n3. А теперь главное: удерживай это положение НЕ 30 секунд, а 2–3 минуты. Дыши спокойно и глубоко. Первые секунд 30 будет тянуть мышца, а дальше, если не бросать, начнёт поддаваться фасция — ты почувствуешь, как натяжение медленно «тает» и таз опускается чуть глубже.\n4. Не дёргайся, не пружинь. Только медленное, неподвижное удержание — фасция любит покой и время.\n5. Поменяй ногу. По 2–3 минуты на каждую сторону.\nИменно долгое удержание меняет фасцию. 30 секунд расслабят мышцу, но фасция вернётся обратно.\n\nУПРАЖНЕНИЕ 3 — разрушаем «застывшую» позу в течение дня:\n\nФасция застывает в той позе, где ты дольше всего. Поэтому если работаешь сидя — раз в час вставай хотя бы на минуту, чтобы не дать ей затвердеть в положении сидя. Проверяй положение таза: он не уехал вперёд, поясница не переразогнута, живот мягкий.",
    k: "Фасция застывает в позе, где ты дольше всего. Чтобы она «оттаяла» в новой форме — удерживай растяжку 2–3 минуты, а не 30 секунд."
  },
  12: {
    t: "Мы прошли четыре инструмента. Давай сведём их вместе в простой распорядок дня, чтобы было понятно, что и когда делать.\n\n• Дыхание животом — это фон, дышишь так постоянно в течение дня.\n• Вакуум — главное упражнение, утром на пустой желудок.\n• Приём the Knack — каждый раз перед чихом, кашлем, нагрузкой.\n\nНе пугайся объёма — на всё уходит минут 10 в день.\n\nПро прогиб в пояснице: если по тесту из урока 2 у тебя есть прогиб (большой зазор под поясницей) — обязательно добавь упражнения из урока 11. И помни: прогиб не убрать десятком наклонов вечером. Тут важнее не количество, а регулярность — растягивай поясничную мышцу каждый день и держи таз ровно в течение всего дня. Если прогиба нет — эти упражнения можно не делать.",
    p: "УТРО (на пустой желудок, ~7 минут):\n• Вакуум: 8–10 удержаний по 10–15 секунд\n• Затем 2 минуты спокойного дыхания животом\n\nДНЁМ (фоном, не требует отдельного времени):\n• Дышишь животом\n• Перед каждым чихом/кашлем/подъёмом тяжести — приём the Knack (подтянуть тазовое дно)\n• Раз в час встаёшь, если сидишь\n\nЕСЛИ ЕСТЬ ПРОГИБ В ПОЯСНИЦЕ (по тесту из урока 2):\n• Добавь упражнения из урока 11 — каждый день\n• Растяжку поясничной мышцы держи подольше: по 2–3 минуты на сторону\n\nСегодня просто пройди весь утренний блок и засеки время. Запомни, сколько секунд держишь вакуум — через две недели сравнишь, станет легче.",
    k: "10 минут в день. Остальное работает само — через дыхание."
  },
  13: {
    t: "Упражнения запускают строительство фасции. Но чтобы клеткам было ИЗ ЧЕГО её строить, нужны определённые вещества из еды. Это как со стройкой: дать команду строить мало — нужны ещё кирпичи и цемент.\n\nЧто конкретно нужно фасции:\n\n• Витамин С — без него коллаген (главный белок фасции) просто не получается прочным. Это самый важный «кирпич».\n• Кремний — помогает коллагеновым волокнам быть упругими.\n• Цинк и медь — без них волокна не «сшиваются» между собой в прочную сеть.\n• Вода — фасция на большую часть состоит из воды. Обезвоженная фасция становится сухой и слипшейся.\n\nМаленькая хитрость: если выпить воду с витамином С (например, с лимоном или шиповником) за полчаса до утреннего вакуума — к моменту нагрузки «кирпичи» уже будут на месте, и строительство пойдёт активнее.",
    p: "Где брать эти вещества из обычной еды:\n\n• Витамин С: красный болгарский перец, шиповник, чёрная смородина, киви, цитрусовые, петрушка, брокколи\n• Кремний: огурцы с кожурой, чай из хвоща или крапивы, овёс\n• Цинк: тыквенные семечки, кунжут, кешью, нут, чечевица\n• Медь: какао, кунжут, кешью, семечки подсолнуха\n• Вода: примерно 30 мл на каждый килограмм веса в день (при весе 60 кг — около 1,8 литра чистой воды)\n\nПростой шаг: каждое утро перед вакуумом выпивай стакан воды с лимоном или настой шиповника.\n\nЕсли хочешь усилить эффект добавками. Из еды получить все вещества можно, но не всегда стабильно. Если хочешь быть уверена, что фасции хватает материала, вот проверенные добавки, которыми пользуюсь сама:\n\n• Кремний BioSil (генератор коллагена, капли): [купить на Ozon](https://www.ozon.ru/product/biosil-kapli-zhidkost-kremniy-i-holin-biosil-generator-kollagena-bad-dlya-sustavov-i-svyazok-kozhi-1089393488/)\n• Медь (хелат, Thorne): [купить на Ozon](https://www.ozon.ru/product/med-helat-thorne-research-60-kapsul-250064042/)\n• Витамин С (липосомальный) и Цинк: [смотреть здесь](https://liposomalvitamins.ru/products#rec759367625)\n\nНа витамин С и цинк (по последней ссылке) действует мой промокод Vesna25 — скидка 10%.",
    k: "Дать команду «строй» мало. Нужны ещё и материалы — иначе клеткам нечем строить."
  },
  14: {
    t: "Этот урок — чтобы ты не путала норму с проблемой и зря не пугалась.\n\nНорма для женщины — ходить в туалет 6–8 раз в день. Ночью — ноль или один раз. Здоровый мочевой пузырь вмещает примерно стакан-полтора жидкости.\n\nНо вот что важно знать: то, как часто ты бегаешь в туалет, сильно зависит от того, что ты ешь и пьёшь. И иногда частые походы — это вообще не проблема пузыря, а просто много жидкости проходит через тело.\n\nКогда частые походы — это НОРМА:\n• ты выпила много воды, чая, кофе\n• поела много сочных продуктов — супы, арбуз, дыня, огурцы, апельсины\n• в эти дни ты ходишь чаще, но каждый раз пузырь полный — это просто лишняя жидкость выходит, всё в порядке\n\nОтдельно про тех, кто ест МНОГО фруктов и овощей. Если в твоём рационе много растительной пищи, ты можешь бегать в туалет заметно чаще — и это нормально. Фрукты и овощи на 80–95% состоят из воды, в них много калия (он заставляет почки активнее выводить жидкость), и мало соли (а именно соль удерживает воду в теле). Поэтому вода легко проходит насквозь. Кстати, по этой же причине у таких женщин почти не бывает отёков — но зато чаще хочется в туалет. Это здоровый обмен, а не болезнь.\n\nА вот когда стоит насторожиться — это совсем другая картина:\n• резкий позыв «надо срочно, еле добегаю», но мочи выходит мало\n• приходится вставать в туалет больше двух раз за ночь\n• жжение, резь или боль\n\nГлавное отличие простое: полный пузырь часто — это про жидкость и питание, это нормально. А резкие позывы с малым количеством мочи — это повод обратиться к врачу — причиной может быть инфекция, воспаление или другие состояния, которые важно исключить.",
    p: "Если частые походы мешают — например, не дают спать ночью — можно немного перераспределить жидкость в течение дня:\n\n• Основной объём воды и сочной еды (арбуз, дыня, огурец, суп, фрукты) — переноси на первую половину дня.\n• Вечером выбирай более «сухую» еду: каши, тушёные овощи, орехи, авокадо.\n• За 2–3 часа до сна — поменьше пей и поменьше ешь сочного.\n• Щепотка хорошей соли (например, гималайской) в течение дня помогает удержать немного воды в теле — и ты будешь реже бегать в туалет.",
    k: "Полный пузырь часто — это про воду и еду, это нормально. А резкие позывы с малым количеством мочи — повод сходить к врачу."
